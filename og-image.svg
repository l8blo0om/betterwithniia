<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&amp;family=Dancing+Script:wght@600&amp;family=Inter:wght@400;600;900&amp;display=swap');
    </style>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#1E3870"/>

  <!-- Subtle texture lines -->
  <rect width="1200" height="630" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="60"/>

  <!-- Logo circle -->
  <circle cx="600" cy="270" r="180" fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="2"/>

  <!-- "Get" script text -->
  <text x="530" y="210" font-family="Georgia, serif" font-size="52" font-style="italic" fill="rgba(255,255,255,0.75)" font-weight="400">Get</text>

  <!-- "BETTER" bold text -->
  <text x="600" y="295" font-family="Arial, sans-serif" font-size="80" font-weight="900" fill="white" text-anchor="middle" letter-spacing="-2">BETTER</text>

  <!-- "WITH NIIA" spaced text -->
  <text x="600" y="340" font-family="Arial, sans-serif" font-size="16" font-weight="400" fill="rgba(255,255,255,0.6)" text-anchor="middle" letter-spacing="8">WITH NIIA</text>

  <!-- Divider line -->
  <line x1="552" y1="468" x2="648" y2="468" stroke="#BFA05A" stroke-width="1.5"/>

  <!-- Tagline -->
  <text x="600" y="500" font-family="Georgia, serif" font-size="20" fill="rgba(255,255,255,0.55)" text-anchor="middle" letter-spacing="2">COLUMBIA, SC · GYROTONIC® STUDIO</text>
</svg>
